<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: radial-gradient(circle at top, #fffafa 0%, #f8e6e6 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  color: #6e3a3a;
}

.container {
  width: 90%;
  max-width: 420px;
  animation: fadeIn 1.2s ease-in-out;
}

.logo {
  width: 170px;
  margin-bottom: 15px;
}

.brand-title {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin: 5px 0;
  color: #8b3a3a;
}

.subtitle {
  letter-spacing: 3px;
  font-size: 12px;
  margin-bottom: 35px;
  color: #b46a6a;
}

.link {
  display: block;
  text-decoration: none;
  background: linear-gradient(135deg, #d77c7c, #b85c5c);
  color: white;
  padding: 16px;
  margin: 15px 0;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 400;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(184, 92, 92, 0.25);
}

.link:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 25px rgba(184, 92, 92, 0.35);
}

footer {
  margin-top: 35px;
  font-size: 12px;
  color: #b88c8c;
}

.tagline {
  margin-top: 8px;
  font-size: 13px;
  font-style: italic;
  color: #a56a6a;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="container">

  <img src="logo.png" alt="Shine Beauty and Nails" class="logo">
